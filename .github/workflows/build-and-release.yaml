name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [mac, mac64, windows]
    runs-on: ${{ matrix.platform == 'mac' && 'macos-latest' || matrix.platform == 'mac64' && 'macos-15-intel' || 'windows-latest' }}
    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v6

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install workspace dependencies
        run: |
          npm ci

      # === FRONTEND ===
      - name: Install frontend dependencies
        run: |
          cd frontend && npm ci

      - name: Build frontend
        run: |
          cd frontend && npm run build

      # === CORE ===
      - name: Install core dependencies
        run: |
          cd core && npm ci

      - name: Build core
        run: |
          cd core && npm run build

      # === APP ===
      - name: Install app dependencies
        run: |
          cd app && npm ci

      - name: Build app
        shell: bash
        run: |
          cd app && 
          if [ "${{ matrix.platform }}" == "mac" ]; then
            npm run build:mac
          elif [ "${{ matrix.platform }}" == "mac64" ]; then
            npm run build:mac64
          else
            npm run build:win
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: ${{ matrix.platform == 'mac' && 'app/dist/openall-0.2.0-arm64.dmg' || matrix.platform == 'mac64' && 'app/dist/openall-0.2.0.dmg' || 'app/dist/openall 0.2.0.exe' }}
          archive: false
