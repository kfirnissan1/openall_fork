name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        platform: [mac, windows]
    runs-on: ${{ matrix.platform == 'mac' && 'macos-latest' || 'ubuntu-latest' }}
    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      # === FRONTEND ===
      - name: Install frontend dependencies
        run: |
          cd frontend && npm ci

      - name: Build frontend
        run: |
          cd frontend && npm run build

      # === CORE ===
      - name: Install core dependencies
        run: |
          cd core && npm ci

      - name: Build core
        run: |
          cd core && npm run build

      # === APP ===
      - name: Install app dependencies
        run: |
          cd app && npm ci

      # Copy frontend and core dist into app
      - name: Copy core dist into app
        run: |
          cp -r ./core/dist ./app/

      - name: Copy frontend dist into app as static
        run: |
          rm -rf ./app/static
          cp -r ./frontend/dist ./app/static

      - name: Build app
        shell: bash
        run: |
          cd app && 
          if [ "${{ matrix.platform }}" == "mac" ]; then
            npm run build:mac
          else
            npm run build:win
          fi

      # Zip app dist for release
      - name: Zip app dist
        run: |
          cd app && 
          if [ "${{ matrix.platform }}" == "mac" ]; then
            zip -r electron-mac.zip dist/mac
          else
            zip -r electron-win.zip dist/win-unpacked
          fi

      - name: ls app dist
        run: |
          cd app/dist && ls -l

      # - name: Upload build artifacts
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: build-output
      #     path: dist/

      # Create GitHub release
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release ${{ github.run_number }}
          draft: false
          prerelease: false

      # Upload release asset
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ matrix.platform == 'mac' && 'app/electron-mac.zip' || 'app/electron-win.zip' }}
          asset_name: ${{ matrix.platform == 'mac' && 'electron-mac.zip' || 'electron-win.zip' }}
          asset_content_type: application/zip