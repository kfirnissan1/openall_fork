name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [mac, windows]
    runs-on: ${{ matrix.platform == 'mac' && 'macos-latest' || 'windows-latest' }}
    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v6

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install workspace dependencies
        run: |
          npm ci

      # === FRONTEND ===
      - name: Install frontend dependencies
        run: |
          cd frontend && npm ci

      - name: Build frontend
        run: |
          cd frontend && npm run build

      # === CORE ===
      - name: Install core dependencies
        run: |
          cd core && npm ci

      - name: Build core
        run: |
          cd core && npm run build

      # === APP ===
      - name: Install app dependencies
        run: |
          cd app && npm ci

      - name: Build app
        shell: bash
        run: |
          cd app && 
          if [ "${{ matrix.platform }}" == "mac" ]; then
            npm run build:mac
          else
            npm run build:win
          fi

      # Zip app dist for release
      - name: Zip app dist
        run: |
          cd app && 
          if [ "${{ matrix.platform }}" == "mac" ]; then
            zip -r electron-mac.zip dist/mac-arm64
          else
            powershell -Command "Compress-Archive -Path 'dist/win-unpacked/*' -DestinationPath 'electron-win.zip'"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: ${{ matrix.platform == 'mac' && 'app/electron-mac.zip' || 'app/electron-win.zip' }}
          archive: false
